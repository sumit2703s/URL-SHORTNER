services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BASE_URL: http://localhost:8000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
