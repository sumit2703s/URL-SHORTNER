name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Unit Tests ───────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run pytest
        run: pytest app/tests/ -v

  # ── Job 2: Docker Build ────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          tags: url-shortener:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Integration Tests ───────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for healthy app
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "✅ App is healthy!"
              exit 0
            fi
            echo "Attempt $i/15 — waiting 2s..."
            sleep 2
          done
          echo "❌ App did not become healthy in time"
          exit 1

      - name: Test /shorten endpoint
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8000/shorten \
            -H "Content-Type: application/json" \
            -d '{"url": "https://example.com"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          code = data['short_code']
          assert len(code) == 6, f'Expected 6-char code, got {len(code)}'
          assert code.isalnum(), f'Code is not alphanumeric: {code}'
          assert 'short_url' in data, 'Missing short_url field'
          print(f'✅ Short code: {code}')
          print(f'✅ Short URL: {data[\"short_url\"]}')
          "

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Job 4: Deploy Backend to Render ────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for Render to be healthy
        run: |
          echo "Waiting for Render deployment to become healthy..."
          for i in $(seq 1 24); do
            if curl -sf "${{ secrets.RENDER_APP_URL }}/health" | grep -q '"status":"ok"'; then
              echo "Render backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 10s..."
            sleep 10
          done
          echo "Render deployment did not become healthy in time"
          exit 1

  # ── Job 5: Deploy Frontend to Vercel ───────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --cwd ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
